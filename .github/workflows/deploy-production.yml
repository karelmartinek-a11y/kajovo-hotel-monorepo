name: Deploy - hotel.hcasc.cz

on:
  workflow_run:
    workflows: ["CI Gates - KajovoHotel"]
    types:
      - completed
    branches:
      - main

concurrency:
  group: deploy-hotel-hcasc-production
  cancel-in-progress: true

permissions: {}

jobs:
  deploy-production:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
      DEPLOY_BASE_URL: https://hotel.hcasc.cz
      HOTEL_DEPLOY_HOST: ${{ secrets.HOTEL_DEPLOY_HOST != '' && secrets.HOTEL_DEPLOY_HOST || vars.HOTEL_DEPLOY_HOST }}
      HOTEL_DEPLOY_PORT: ${{ secrets.HOTEL_DEPLOY_PORT != '' && secrets.HOTEL_DEPLOY_PORT || vars.HOTEL_DEPLOY_PORT }}
      HOTEL_DEPLOY_USER: ${{ secrets.HOTEL_DEPLOY_USER != '' && secrets.HOTEL_DEPLOY_USER || vars.HOTEL_DEPLOY_USER }}
      HOTEL_DEPLOY_PASS: ${{ secrets.HOTEL_DEPLOY_PASS != '' && secrets.HOTEL_DEPLOY_PASS || vars.HOTEL_DEPLOY_PASS }}
      HOTEL_ADMIN_EMAIL: ${{ secrets.HOTEL_ADMIN_EMAIL != '' && secrets.HOTEL_ADMIN_EMAIL || vars.HOTEL_ADMIN_EMAIL }}
      HOTEL_ADMIN_PASSWORD: ${{ secrets.HOTEL_ADMIN_PASSWORD != '' && secrets.HOTEL_ADMIN_PASSWORD || vars.HOTEL_ADMIN_PASSWORD }}
      KAJOVO_API_ADMIN_EMAIL: ${{ secrets.KAJOVO_API_ADMIN_EMAIL != '' && secrets.KAJOVO_API_ADMIN_EMAIL || vars.KAJOVO_API_ADMIN_EMAIL || secrets.HOTEL_ADMIN_EMAIL || vars.HOTEL_ADMIN_EMAIL }}
      KAJOVO_API_ADMIN_PASSWORD: ${{ secrets.KAJOVO_API_ADMIN_PASSWORD != '' && secrets.KAJOVO_API_ADMIN_PASSWORD || vars.KAJOVO_API_ADMIN_PASSWORD || secrets.HOTEL_ADMIN_PASSWORD || vars.HOTEL_ADMIN_PASSWORD }}
    steps:
      - name: Checkout deploy SHA
        uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate deploy target environment
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${HOTEL_DEPLOY_HOST:-}" ]; then
            echo "Missing HOTEL_DEPLOY_HOST in GitHub secrets or variables." >&2
            exit 1
          fi
          if [ -z "${HOTEL_DEPLOY_PORT:-}" ]; then
            echo "Missing HOTEL_DEPLOY_PORT in GitHub secrets or variables." >&2
            exit 1
          fi
          if [ -z "${HOTEL_DEPLOY_USER:-}" ]; then
            echo "Missing HOTEL_DEPLOY_USER in GitHub secrets or variables." >&2
            exit 1
          fi
          if [ -z "${HOTEL_DEPLOY_PASS:-}" ]; then
            echo "Missing HOTEL_DEPLOY_PASS in GitHub secrets or variables." >&2
            exit 1
          fi
          echo "Deploy target environment check: PASS"

      - name: Validate admin credential environment
        run: python scripts/check_admin_credentials_env.py

      - name: Android release integrity gate
        run: python scripts/check_android_release_integrity.py

      - name: Build release archive
        shell: bash
        run: |
          set -euo pipefail
          archive="kajovo-deploy-${DEPLOY_SHA}.tar.gz"
          git archive --format=tar.gz --output "$archive" "$DEPLOY_SHA"
          echo "RELEASE_ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Upload release archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.HOTEL_DEPLOY_HOST }}
          username: ${{ env.HOTEL_DEPLOY_USER }}
          password: ${{ env.HOTEL_DEPLOY_PASS }}
          port: ${{ env.HOTEL_DEPLOY_PORT }}
          source: ${{ env.RELEASE_ARCHIVE }}
          target: /tmp/
          overwrite: true

      - name: Deploy uploaded release via SSH password
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.HOTEL_DEPLOY_HOST }}
          username: ${{ env.HOTEL_DEPLOY_USER }}
          password: ${{ env.HOTEL_DEPLOY_PASS }}
          port: ${{ env.HOTEL_DEPLOY_PORT }}
          envs: DEPLOY_SHA,RELEASE_ARCHIVE,HOTEL_ADMIN_EMAIL,HOTEL_ADMIN_PASSWORD,KAJOVO_API_ADMIN_EMAIL,KAJOVO_API_ADMIN_PASSWORD
          script: |
            set -euo pipefail
            set -x
            release_archive="/tmp/${RELEASE_ARCHIVE}"
            release_root="/opt/kajovo-hotel-monorepo"
            preserve_dir="$(mktemp -d)"
            if [ ! -f "$release_archive" ]; then
              echo "Missing uploaded archive: $release_archive" >&2
              exit 1
            fi
            if [ -f "$release_root/infra/.env" ]; then
              mkdir -p "$preserve_dir/infra"
              cp "$release_root/infra/.env" "$preserve_dir/infra/.env"
            fi
            mkdir -p "$release_root"
            find "$release_root" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            tar -xzf "$release_archive" -C "$release_root"
            if [ -f "$preserve_dir/infra/.env" ]; then
              mkdir -p "$release_root/infra"
              mv "$preserve_dir/infra/.env" "$release_root/infra/.env"
            fi
            rm -rf "$preserve_dir"
            rm -f "$release_archive"
            export KAJOVO_API_ADMIN_EMAIL="${KAJOVO_API_ADMIN_EMAIL:-$HOTEL_ADMIN_EMAIL}"
            export KAJOVO_API_ADMIN_PASSWORD="${KAJOVO_API_ADMIN_PASSWORD:-$HOTEL_ADMIN_PASSWORD}"
            export SKIP_GIT_SYNC=true
            export DEPLOY_SOURCE_SHA="$DEPLOY_SHA"
            set +e
            "$release_root/infra/ops/deploy-production.sh"
            DEPLOY_STATUS=$?
            cd "$release_root"
            export COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-kajovo-prod}
            docker compose -f infra/compose.prod.yml -f infra/compose.prod.hotel-hcasc.yml ps -a
            docker compose -f infra/compose.prod.yml -f infra/compose.prod.hotel-hcasc.yml logs api --tail=300 || true
            docker compose -f infra/compose.prod.yml -f infra/compose.prod.hotel-hcasc.yml logs postgres --tail=80 || true
            docker compose -f infra/compose.prod.yml -f infra/compose.prod.hotel-hcasc.yml logs admin --tail=80 || true
            docker compose -f infra/compose.prod.yml -f infra/compose.prod.hotel-hcasc.yml logs web --tail=80 || true
            exit "$DEPLOY_STATUS"

      - name: Verify deploy runtime artifact on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.HOTEL_DEPLOY_HOST }}
          username: ${{ env.HOTEL_DEPLOY_USER }}
          password: ${{ env.HOTEL_DEPLOY_PASS }}
          port: ${{ env.HOTEL_DEPLOY_PORT }}
          envs: DEPLOY_SHA
          script: |
            set -euo pipefail
            runtime_artifact="/opt/kajovo-hotel-monorepo/artifacts/deploy-runtime/latest.json"
            if [ ! -f "$runtime_artifact" ]; then
              echo "Missing runtime artifact on server: $runtime_artifact" >&2
              exit 1
            fi
            python3 - <<'PY'
            import json
            import os
            from pathlib import Path

            path = Path("/opt/kajovo-hotel-monorepo/artifacts/deploy-runtime/latest.json")
            payload = json.loads(path.read_text(encoding="utf-8"))
            expected = os.environ["DEPLOY_SHA"]
            actual = str(payload.get("sha") or "")
            if actual not in {expected, expected[:7]}:
                raise SystemExit(f"deploy artifact SHA mismatch: expected {expected}, got {actual}")
            android_release = payload.get("android_release") or {}
            if not android_release.get("version"):
                raise SystemExit("deploy runtime artifact missing android_release.version")
            if not android_release.get("version_code"):
                raise SystemExit("deploy runtime artifact missing android_release.version_code")
            if not android_release.get("sha256"):
                raise SystemExit("deploy runtime artifact missing android_release.sha256")
            print("Deploy runtime artifact SHA on server: PASS")
            PY

      - name: Write deploy verification artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          payload = {
              "verified_at": datetime.now(timezone.utc).isoformat(),
              "sha": os.environ["DEPLOY_SHA"],
              "base_url": os.environ["DEPLOY_BASE_URL"],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "remote_runtime_artifact": "/opt/kajovo-hotel-monorepo/artifacts/deploy-runtime/latest.json",
              "server_runtime_artifact_sha_verified": True,
          }
          Path("artifacts/latest.json").write_text(
              json.dumps(payload, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Post-deploy HTTP gate
        shell: bash
        run: |
          set -euo pipefail
          check_endpoint() {
            local url="$1"
            local label="$2"
            local expected="$3"
            local code=""
            for attempt in $(seq 1 30); do
              code=$(curl -k -sS -o /tmp/deploy-check-body.txt -w '%{http_code}' "$url" || true)
              if [[ "$code" == "$expected" ]]; then
                echo "$label PASS ($code)"
                return 0
              fi
              echo "$label attempt $attempt/30 -> HTTP $code"
              sleep 10
            done
            echo "$label FAIL -> expected HTTP $expected, got $code" >&2
            cat /tmp/deploy-check-body.txt >&2 || true
            return 1
          }
          check_endpoint "$DEPLOY_BASE_URL/" "public root" "200"
          check_endpoint "$DEPLOY_BASE_URL/admin/login" "admin login page" "200"
          check_endpoint "$DEPLOY_BASE_URL/api/health" "api health" "200"

      - name: Verify live Android release metadata
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import urllib.request
          from pathlib import Path

          manifest_path = Path("android/release/android-release.json")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          with urllib.request.urlopen("https://hotel.hcasc.cz/api/app/android-release", timeout=20) as response:
              payload = json.loads(response.read().decode("utf-8"))
          assert payload["version_code"] == manifest["version_code"], payload
          assert payload["version"] == manifest["version_name"], payload
          assert payload["download_url"] == manifest["download_url"], payload
          assert payload["sha256"] == manifest["sha256"], payload
          print("Live Android release metadata: PASS")
          PY

      - name: Verify live admin login with GitHub credentials
        env:
          VERIFY_BASE_URL: ${{ env.DEPLOY_BASE_URL }}
          VERIFY_ADMIN_EMAIL: ${{ env.KAJOVO_API_ADMIN_EMAIL != '' && env.KAJOVO_API_ADMIN_EMAIL || env.HOTEL_ADMIN_EMAIL }}
          VERIFY_ADMIN_PASSWORD: ${{ env.KAJOVO_API_ADMIN_PASSWORD != '' && env.KAJOVO_API_ADMIN_PASSWORD || env.HOTEL_ADMIN_PASSWORD }}
        run: node scripts/verify_live_admin_login.mjs

      - name: Verify live admin user-management smoke
        env:
          VERIFY_BASE_URL: ${{ env.DEPLOY_BASE_URL }}
          VERIFY_ADMIN_EMAIL: ${{ env.KAJOVO_API_ADMIN_EMAIL != '' && env.KAJOVO_API_ADMIN_EMAIL || env.HOTEL_ADMIN_EMAIL }}
          VERIFY_ADMIN_PASSWORD: ${{ env.KAJOVO_API_ADMIN_PASSWORD != '' && env.KAJOVO_API_ADMIN_PASSWORD || env.HOTEL_ADMIN_PASSWORD }}
          VERIFY_DEPLOY_SHA: ${{ env.DEPLOY_SHA }}
        run: node scripts/verify_live_admin_users_smoke.mjs

      - name: Dump API logs after failed live users smoke
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.HOTEL_DEPLOY_HOST }}
          username: ${{ env.HOTEL_DEPLOY_USER }}
          password: ${{ env.HOTEL_DEPLOY_PASS }}
          port: ${{ env.HOTEL_DEPLOY_PORT }}
          script: |
            set -euo pipefail
            cd /opt/kajovo-hotel-monorepo
            export COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-kajovo-prod}
            docker compose -f infra/compose.prod.yml -f infra/compose.prod.hotel-hcasc.yml logs api --tail=200 || true

      - name: Upload deploy runtime artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: deploy-runtime-artifact
          path: artifacts/latest.json
          if-no-files-found: ignore
