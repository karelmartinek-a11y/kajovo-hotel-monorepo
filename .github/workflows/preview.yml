name: Preview Build - Kájovo Hotel

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preview:
    runs-on: ubuntu-latest
    concurrency:
      group: preview-build
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Configure pnpm store
        run: pnpm config set store-dir ~/.pnpm-store

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --store ~/.pnpm-store

      - name: Build portal client
        run: pnpm --filter @kajovo/kajovo-hotel-web build

      - name: Build admin client
        run: pnpm --filter @kajovo/kajovo-hotel-admin build

      - name: Package web client
        run: tar -czf web-preview.tar.gz -C apps/kajovo-hotel-web/dist .

      - name: Package admin client
        run: tar -czf admin-preview.tar.gz -C apps/kajovo-hotel-admin/dist .

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: preview-artifacts
          path: |
            web-preview.tar.gz
            admin-preview.tar.gz

      - name: Note staging gap
        run: |
          echo "Preview build produced artifacts for manual deployment."
          echo "Automated staging deploy is blocked until staging host/credentials (e.g., STAGING_DEPLOY_HOST) are available."
