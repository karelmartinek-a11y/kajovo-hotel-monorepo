name: CI Release - Kajovo Hotel

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HOTEL_ADMIN_EMAIL: ${{ secrets.HOTEL_ADMIN_EMAIL != '' && secrets.HOTEL_ADMIN_EMAIL || vars.HOTEL_ADMIN_EMAIL }}
  HOTEL_ADMIN_PASSWORD: ${{ secrets.HOTEL_ADMIN_PASSWORD != '' && secrets.HOTEL_ADMIN_PASSWORD || vars.HOTEL_ADMIN_PASSWORD }}
  KAJOVO_API_ADMIN_EMAIL: ${{ secrets.KAJOVO_API_ADMIN_EMAIL != '' && secrets.KAJOVO_API_ADMIN_EMAIL || vars.KAJOVO_API_ADMIN_EMAIL || secrets.HOTEL_ADMIN_EMAIL || vars.HOTEL_ADMIN_EMAIL }}
  KAJOVO_API_ADMIN_PASSWORD: ${{ secrets.KAJOVO_API_ADMIN_PASSWORD != '' && secrets.KAJOVO_API_ADMIN_PASSWORD || vars.KAJOVO_API_ADMIN_PASSWORD || secrets.HOTEL_ADMIN_PASSWORD || vars.HOTEL_ADMIN_PASSWORD }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Configure pnpm store
        run: pnpm config set store-dir ~/.pnpm-store

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('apps/kajovo-hotel-api/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./apps/kajovo-hotel-api[dev]

      - name: Validate admin credential environment
        run: python scripts/check_admin_credentials_env.py

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile --store ~/.pnpm-store

      - name: Run TypeScript lint
        run: pnpm lint

      - name: Run backend unit tests
        run: pnpm unit

      - name: Android release integrity gate
        run: pnpm ci:android-release-integrity

      - name: Materialize Android upload keystore
        shell: bash
        env:
          KAJOVO_UPLOAD_STORE_FILE_B64: ${{ secrets.KAJOVO_UPLOAD_STORE_FILE_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${KAJOVO_UPLOAD_STORE_FILE_B64:-}" ]; then
            echo "Missing KAJOVO_UPLOAD_STORE_FILE_B64 secret." >&2
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/kajovo-signing"
          printf '%s' "$KAJOVO_UPLOAD_STORE_FILE_B64" | base64 --decode > "$RUNNER_TEMP/kajovo-signing/kajovo-hotel-upload.jks"
          echo "KAJOVO_UPLOAD_STORE_FILE=$RUNNER_TEMP/kajovo-signing/kajovo-hotel-upload.jks" >> "$GITHUB_ENV"
          echo "KAJOVO_UPLOAD_STORE_PASSWORD=${HOTEL_ADMIN_PASSWORD}" >> "$GITHUB_ENV"
          echo "KAJOVO_UPLOAD_KEY_ALIAS=${{ secrets.KAJOVO_UPLOAD_KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "KAJOVO_UPLOAD_KEY_PASSWORD=${HOTEL_ADMIN_PASSWORD}" >> "$GITHUB_ENV"

      - name: Policy rule unit tests
        run: pnpm ci:policy-test

      - name: Policy sentinel gate
        run: pnpm ci:policy

      - name: Build portal client
        run: pnpm --filter @kajovo/kajovo-hotel-web build

      - name: Build admin client
        run: pnpm --filter @kajovo/kajovo-hotel-admin build

      - name: Build signed Android release APK
        working-directory: android
        env:
          ORG_GRADLE_PROJECT_KAJOVO_UPLOAD_STORE_FILE: ${{ env.KAJOVO_UPLOAD_STORE_FILE }}
          ORG_GRADLE_PROJECT_KAJOVO_UPLOAD_STORE_PASSWORD: ${{ env.KAJOVO_UPLOAD_STORE_PASSWORD }}
          ORG_GRADLE_PROJECT_KAJOVO_UPLOAD_KEY_ALIAS: ${{ env.KAJOVO_UPLOAD_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_KAJOVO_UPLOAD_KEY_PASSWORD: ${{ env.KAJOVO_UPLOAD_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Install Playwright browser
        run: pnpm --filter @kajovo/kajovo-hotel-web exec playwright install --with-deps chromium

      - name: Run smoke e2e suite
        run: pnpm --filter @kajovo/kajovo-hotel-web test:smoke
