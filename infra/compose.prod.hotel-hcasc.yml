services:
  api:
    environment:
      # Produkcni hotel.hcasc.cz ma mit realne SMTP povolene.
      # Skutecne odeslani stale vyzaduje ulozenou SMTP konfiguraci v adminu.
      KAJOVO_API_SMTP_ENABLED: ${KAJOVO_API_SMTP_ENABLED:-true}
      KAJOVO_API_SKIP_MIGRATIONS: "1"
    ports:
      - "${API_PORT:-8202}:8000"
    networks:
      - kajovo_net
      - hotelapp_net

  web:
    ports:
      - "${WEB_PORT:-8080}:80"

networks:
  hotelapp_net:
    external: true
    name: deploy_hotelapp_net
